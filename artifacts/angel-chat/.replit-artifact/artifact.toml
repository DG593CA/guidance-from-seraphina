kind = "web"
previewPath = "/"
title = "Angel Chat Landing Page"
version = "1.0.0"
id = "artifacts/angel-chat"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19001

[services.development]
run = "pnpm --filter @workspace/angel-chat run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/angel-chat", "run", "build" ]
publicDir = "artifacts/angel-chat/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19001"
BASE_PATH = "/"
